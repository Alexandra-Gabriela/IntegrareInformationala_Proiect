server.port=8091
server.servlet.context-path=/DSA_SQL_JPAService/rest

### Configurare PostgreSQL pentru ProiectSIA
spring.datasource.url=jdbc:postgresql://localhost:5432/ProiectSIA
spring.datasource.username=ecommerce_admin
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=ecommerce

# Securitate (standard din proiectul prof-ului)
spring.security.user.name=developer
spring.security.user.password=iis